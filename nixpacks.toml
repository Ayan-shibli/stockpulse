[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "pip install --extra-index-url https://download.pytorch.org/whl/cpu torch==2.1.0+cpu",
  "pip install fastapi uvicorn pydantic requests yfinance python-dotenv groq langgraph numpy"
]

[start]
cmd = "cd research_agent && uvicorn server:app --host 0.0.0.0 --port $PORT"
