services:
  - type: web
    name: astraquant-backend
    runtime: python
    rootDir: research_agent
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://astraquant.vercel.app
